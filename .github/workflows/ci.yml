name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          filter: tree:0
          fetch-depth: 0

      # Version comes from the "packageManager" field in package.json,
      # keeping CI and local dev on the same pnpm.
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Connect your workspace by running "nx connect" and uncomment this line to enable task distribution
      # - run: pnpm dlx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      # Cache node_modules
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Prisma clients are generated code, excluded from VCS — build imports
      # them. "generate" never connects to a database, but each service's
      # prisma.config.ts requires its *_DATABASE_URL to be set, so give all
      # three a placeholder.
      - run: pnpm db:generate && pnpm db:generate:gateway && pnpm db:generate:analytics
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          GATEWAY_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          ANALYTICS_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      # Prepend any command with "nx record --" to record its logs to Nx Cloud
      # - run: pnpm exec nx record -- echo Hello World
      # content-service/api-gateway/analytics-service build/test depend on
      # their prisma-generate Nx target (uncached, always reruns — see
      # docs/bugs/BUG-0002/BUG-0003), which needs the same DATABASE_URL
      # placeholders as the step above.
      - run: pnpm exec nx run-many -t lint test build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          GATEWAY_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          ANALYTICS_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      # "nx fix-ci" (self-healing CI) requires an Nx Cloud connection —
      # re-add it after running "nx connect" if we adopt Nx Cloud.
